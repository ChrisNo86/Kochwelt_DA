<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./img/logo_small.png">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js" defer></script>
    <title>Kontaktformular</title>
</head>

<body>
    <header class="header-container">
        <div class="nav-conteiner">
            <img src="./img/logo-2.png" alt="Kochwelt-Logo">
        </div>

        <nav class="nav-menu">
            <a href="">Start</a>
            <a href="">Rezept des Tages</a>
            <a href="">Kontakt</a>
            <a href="">Impressum</a>
        </nav>
    </header>

    <main class="contact-main-container">
        <div class="contact-container">
            <h3>Kontaktiere uns</h3> <br> <br>
            <label for="name">Dein Name</label>
            <input class="input-contact" type="text" name="name" id="name"> <br>
            <label for="email">Deine E-Mail</label>
            <input class="input-contact" type="text" name="email" id="email"> <br>
            <label for="message">Deine Nachricht</label>
            <input class="input-your-message" type="text" name="message" id="message"> <br>
            <button>Abschicken</button>
        </div>
    </main>

    <footer class="footer-container">
        <div class="footer-container-footer">

            <div class="footer-left">
                <a href="./index.html">
                    <img src="./img/logo_small.png" alt="Kochwelt Logo">
                </a>
            </div>

            <div class="footer-center">
                <a href="./imprint.html">Impressum</a>
                <a href="./privacy_policy.html">Datenschutz</a>
                <a href="./contact.html">Kontakt</a>
            </div>

            <div class="footer-right">
                <img src="./img/facebook_logo.png" alt="Facebook">
                <img src="./img/instagrram_logo.png" alt="Instagram">
                <img src="./img/tripadvisor_logo.png" alt="Tripadvisor">
            </div>

        </div>
    </footer>

</body>

</html>
