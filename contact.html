<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./img/logo_small.png">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js" defer></script>
    <title>Kontaktformular</title>
</head>

<body>
    <!----Header Container-->
    <div id="header"></div>

    <main class="contact-main-container">
        <form class="contact-container" onsubmit="sendMail(event)">
            <h3>Kontaktiere uns</h3> <br> <br>
            <label for="name">Dein Name:</label>
            <input class="input-contact" type="text" name="name" required > <br>
            <label for="email">Deine E-Mail:</label>
            <input class="input-contact" type="e-mail" name="email" required> <br>
            <label for="message">Deine Nachricht:</label>
            <input class="input-your-message" name="message" required> <br>
            <div class="commit-button"><button class="green-button" type="submit">Abschicken</button></div>
        </form>
    </main>

    <!----Footer Container-->
    <div id="footer"></div>


</body>

</html>
